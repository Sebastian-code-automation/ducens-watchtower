name: Watchtower — réparation semi-automatique des sélecteurs

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  fix-selectors:
    if: github.event.label.name == 'fix-selectors'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: fix-selectors
          show_full_output: true
          prompt: |
            Cette issue GitHub signale un sélecteur cassé sur une des 3 sondes
            (extensions Chrome) du portfolio Ducens. L'issue contient le HTML
            pertinent de la page cassée, collé par Sebastian.

            Fichiers de sélecteurs (un par sonde, format différent pour chacune) :
            - sonde-a-visibility/selectors.json (AI Visibility Checker : Google AI Overview, ChatGPT, Perplexity)
            - sonde-b-geo-audit/selectors.json (GEO Site Auditor : author/publishDate/mainContent génériques)
            - selectors.json à la racine (Real Profit, sonde-c-ecom : pages Etsy)

            Tâche : identifie quelle sonde et quelle cible sont cassées d'après
            l'issue, puis répare en AJOUTANT une nouvelle stratégie en tête de
            la liste "strategies"/"selectors" du bon target (garde les anciennes
            stratégies comme fallback, ne les supprime pas sauf si elles sont
            manifestement invalides). Bump le champ "updatedAt" du fichier
            modifié. Mets à jour ou ajoute un test correspondant dans tests/ si
            pertinent.

            Contraintes strictes :
            - N'édite RIEN d'autre que selectors.json, sonde-a-visibility/selectors.json,
              sonde-b-geo-audit/selectors.json, et des fichiers sous tests/.
            - Ne touche jamais au code des extensions (hors ce repo de toute façon).
            - Crée une nouvelle branche (`git checkout -b fix-selectors/issue-<numéro>`),
              commit tes changements dessus, `git push -u origin <branche>`, puis ouvre
              la PR avec `gh pr create` (base: main). Ne commit et ne push JAMAIS
              directement sur main. Ne merge JAMAIS la PR toi-même.
            - Description de PR claire (quelle sonde, quelle cible, quelle stratégie
              ajoutée, pourquoi).
            - Si l'issue ne contient pas assez d'info pour identifier la cible
              cassée, commente sur l'issue avec `gh issue comment` pour demander la
              précision au lieu de deviner.
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Read,Glob,Grep,Edit(selectors.json),Edit(sonde-a-visibility/selectors.json),Edit(sonde-b-geo-audit/selectors.json),Edit(tests/**),Write(tests/**),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr create:*),Bash(gh issue comment:*),Bash(node --test:*)"
