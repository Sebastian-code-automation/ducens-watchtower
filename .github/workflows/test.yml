name: Watchtower — tests

on:
  pull_request:
    paths:
      - "selectors.json"
      - "sonde-a-visibility/selectors.json"
      - "sonde-b-geo-audit/selectors.json"
      - "tests/**"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --test tests/*.test.mjs
