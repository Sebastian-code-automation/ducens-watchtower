name: Watchtower — détection quotidienne

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC chaque jour, indépendant du PC de Sebastian
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scrape les fiches Chrome Web Store et journalise les métriques
        run: node scripts/scrape-reviews.mjs

      - name: Ping les landings ducens.io
        run: node scripts/ping-landings.mjs

      - name: Commit metrics.csv + status.json
        run: |
          git config user.name "watchtower-bot"
          git config user.email "watchtower-bot@users.noreply.github.com"
          git add metrics.csv status.json
          git commit -m "chore: métriques + statut $(date -u +%F)" || echo "Aucun changement"
          git push

      - name: Ouvre une issue ALERT si une casse ou une landing down est détectée
        if: hashFiles('alert-body.txt') != '' || hashFiles('landing-down.txt') != ''
        run: |
          cat alert-body.txt landing-down.txt 2>/dev/null > combined-alert.txt || true
          gh issue create \
            --title "ALERT — watchtower ($(date -u +%F))" \
            --body-file combined-alert.txt \
            --label ALERT
        env:
          GH_TOKEN: ${{ github.token }}
